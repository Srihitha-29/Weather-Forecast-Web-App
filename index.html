<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Forecast</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <div class="container">

        <div class="search-box">
            <input type="text" id="city" placeholder="Search city..." onkeypress="handleKey(event)">
            <button id="searchBtn" onclick="getWeather()">Search</button>
        </div>

        <p class="error-msg" id="errorMsg"></p>

        <div class="weather-card" id="weatherCard">
            <div class="weather-icon-wrap">
                <img id="icon" src="" alt="Weather Icon">
            </div>
            <div class="city-name" id="cityName"></div>
            <div class="condition-text" id="condition"></div>
            <div class="temperature" id="temperature"></div>
            <div class="stats-row">
                <div class="stat-item">
                    <div class="stat-label">Humidity</div>
                    <div class="stat-value" id="humidity">--%</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Wind</div>
                    <div class="stat-value" id="wind">-- km/h</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Feels like</div>
                    <div class="stat-value" id="feelsLike">--°C</div>
                </div>
            </div>
        </div>

        <div class="forecast-title">5-Day Forecast</div>
        <div id="forecast" class="forecast-container"></div>

    </div>
    <script src="script.js"></script>
</body>
</html>
